<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angry Birds</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
#wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
#gc { display: block; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12); cursor: crosshair; touch-action: none; max-width: 100%; }
#hint { font-size: 12px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gc" width="1100" height="640"></canvas>
  <div id="hint">Drag slingshot · Release to launch · Space = special · Birds are random each try!</div>
</div>
<script>
const C   = document.getElementById('gc');
const ctx = C.getContext('2d');
const W   = 1100, H = 640;
const GROUND_Y    = 530;
const GRAVITY     = 0.20;       // lower = longer flights
const LAUNCH_K    = 0.22;       // multiplier: drag → velocity
const SLING_X     = 175, SLING_Y = 445, SLING_MAX = 72;

// ── Bird catalogue (7 types) ───────────────────────────────────────────────
const BIRDS = {
  red:    { color:'#e03030', r:16, special:null       },  // plain bird
  yellow: { color:'#f5c518', r:14, special:'boost'    },  // Space = speed burst
  blue:   { color:'#4488ff', r:12, special:'split'    },  // Space = split ×3
  green:  { color:'#22cc55', r:15, special:'boomerang'},  // Space = curve back
  black:  { color:'#222222', r:18, special:'bomb'     },  // Space/impact = explode
  white:  { color:'#f0ecd8', r:15, special:'egg'      },  // Space = drop bomb egg
  big:    { color:'#cc1515', r:22, special:null       },  // Terence – huge, no special
};

const ALL_BIRD_TYPES = Object.keys(BIRDS);

// ── Block types ────────────────────────────────────────────────────────────
const BTYPES = {
  wood:  { color:'#c8832a', border:'#7a4d10', hp:3, score:200 },
  stone: { color:'#8a8a9a', border:'#555566', hp:6, score:200 },
  glass: { color:'rgba(170,230,255,0.62)', border:'#7ec8e3', hp:1, score:200 },
};

// ── Levels  (birds randomised per try; only birdCount is fixed) ─────────────
// Layout rule: for each pig at (px,py,r=22), every block to the LEFT must have
// rightEdge ≤ px-26  (i.e. left post x ≤ px-26-postWidth), and every block to
// the RIGHT must have leftEdge ≥ px+26.  This prevents false collision triggers
// on the first frame a block starts falling.
const GY = GROUND_Y;
const LEVELS = [
  {
    birdCount: 4,
    // pigs at x=720 and x=900
    pigs: [{x:720,y:GY-22,r:22},{x:900,y:GY-22,r:22}],
    blocks: [
      // structure 1 around pig x=720: left post right=694 (gap 26), right post left=748 (gap 28)
      {x:670,y:GY-80,w:24,h:80,type:'wood'},
      {x:748,y:GY-80,w:24,h:80,type:'wood'},
      {x:670,y:GY-104,w:102,h:24,type:'wood'},
      // structure 2 around pig x=900: left post right=874 (gap 26), right post left=928 (gap 28)
      {x:850,y:GY-80,w:24,h:80,type:'wood'},
      {x:928,y:GY-80,w:24,h:80,type:'wood'},
      {x:850,y:GY-104,w:102,h:24,type:'wood'},
    ],
    thresholds:[1000,2500,4200],
  },
  {
    birdCount: 5,
    // pigs at x=620, x=810, x=1000
    pigs: [{x:620,y:GY-22,r:22},{x:810,y:GY-22,r:22},{x:1000,y:GY-22,r:22}],
    blocks: [
      // structure 1 (620): left right=572 gap=48→ok; x=548 right=570 gap=50 ✓
      {x:548,y:GY-108,w:22,h:108,type:'stone'},
      {x:646,y:GY-108,w:22,h:108,type:'stone'},
      {x:548,y:GY-130,w:120,h:22,type:'glass'},
      // structure 2 (810): left x=762 right=784 gap=26 ✓
      {x:762,y:GY-108,w:22,h:108,type:'wood'},
      {x:836,y:GY-108,w:22,h:108,type:'wood'},
      {x:762,y:GY-130,w:96,h:22,type:'glass'},
      // structure 3 (1000): left x=952 right=974 gap=26 ✓
      {x:952,y:GY-108,w:22,h:108,type:'stone'},
      {x:1026,y:GY-108,w:22,h:108,type:'stone'},
      {x:952,y:GY-130,w:96,h:22,type:'glass'},
    ],
    thresholds:[2000,4200,6500],
  },
  {
    birdCount: 6,
    // pigs at x=600, x=720, x=830 (glass cage), x=960
    pigs: [
      {x:600,y:GY-22,r:22},{x:720,y:GY-22,r:22},
      {x:830,y:GY-22,r:22},{x:960,y:GY-22,r:22},
    ],
    blocks: [
      // structure 1 (600, stone): left x=552 right=574 gap=26 ✓
      {x:552,y:GY-108,w:22,h:108,type:'stone'},
      {x:626,y:GY-108,w:22,h:108,type:'stone'},
      {x:552,y:GY-130,w:96,h:22,type:'stone'},
      // structure 2 (720, wood): left x=672 right=694 gap=26 ✓
      {x:672,y:GY-108,w:22,h:108,type:'wood'},
      {x:746,y:GY-108,w:22,h:108,type:'wood'},
      {x:672,y:GY-130,w:96,h:22,type:'wood'},
      // structure 3 (830, glass cage): left x=782 right=804 gap=26 ✓
      {x:782,y:GY-85,w:22,h:85,type:'glass'},
      {x:856,y:GY-85,w:22,h:85,type:'glass'},
      {x:782,y:GY-107,w:96,h:22,type:'glass'},
      // structure 4 (960, stone): left x=912 right=934 gap=26 ✓
      {x:912,y:GY-108,w:22,h:108,type:'stone'},
      {x:986,y:GY-108,w:22,h:108,type:'stone'},
      {x:912,y:GY-130,w:96,h:22,type:'stone'},
    ],
    thresholds:[3000,5800,9000],
  },
];

// ── State ──────────────────────────────────────────────────────────────────
let gs = 'menu';
let lvlIdx=0, score=0, settleTimer=0;
let bestStars=[0,0,0];
let birds=[], activeBird=null, extraBirds=[], eggs=[];
let pigs=[], blocks=[], particles=[];
let dragging=false, dragX=SLING_X, dragY=SLING_Y;
let specialUsed=false;

try{const s=JSON.parse(localStorage.getItem('ab_stars')||'[]');if(Array.isArray(s))bestStars=s.concat([0,0,0]).slice(0,3);}catch(e){}

// ── Helpers ────────────────────────────────────────────────────────────────
function rnd(a,b){ return a+Math.random()*(b-a); }

function randomBirds(count) {
  return Array.from({length:count}, ()=>({type:ALL_BIRD_TYPES[Math.floor(Math.random()*ALL_BIRD_TYPES.length)]}));
}

function burst(x,y,color,n=12) {
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+rnd(0,0.6), sp=rnd(2,7);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,r:rnd(2,5),color,life:rnd(35,55),maxLife:55});
  }
}

function explode(x,y,rad) {
  burst(x,y,'#ff8800',22); burst(x,y,'#ffee44',14);
  pigs.forEach(pig=>{
    if(pig.dead)return;
    if(Math.hypot(pig.x-x,pig.y-y)<rad+pig.r){pig.hp-=4;if(pig.hp<=0){pig.dead=true;score+=1000;burst(pig.x,pig.y,'#88dd44',16);}}
  });
  blocks.forEach(blk=>{
    if(blk.destroyed)return;
    const bcx=blk.x+blk.w/2,bcy=blk.y+blk.h/2;
    const d=Math.hypot(bcx-x,bcy-y);
    if(d<rad+Math.max(blk.w,blk.h)/2){
      blk.hp-=5; blk.vx=(bcx-x)/Math.max(d,1)*7; blk.vy=(bcy-y)/Math.max(d,1)*7-3; blk.falling=true;
      if(blk.hp<=0){blk.destroyed=true;score+=BTYPES[blk.type].score;burst(bcx,bcy,BTYPES[blk.type].color,10);}
    }
  });
}

function circAABB(cx,cy,cr,bx,by,bw,bh){
  const nx=Math.max(bx,Math.min(cx,bx+bw)),ny=Math.max(by,Math.min(cy,by+bh));
  return (cx-nx)**2+(cy-ny)**2<cr*cr;
}
function circCirc(ax,ay,ar,bx,by,br){return(ax-bx)**2+(ay-by)**2<(ar+br)**2;}

// ── Level setup ────────────────────────────────────────────────────────────
function loadLevel(n) {
  const lvl=LEVELS[n];
  lvlIdx=n; score=0; dragging=false; specialUsed=false;
  particles=[]; extraBirds=[]; eggs=[]; activeBird=null;
  birds=randomBirds(lvl.birdCount);
  pigs=lvl.pigs.map(p=>({...p,hp:2,maxHp:2,dead:false}));
  blocks=lvl.blocks.map(b=>({...b,hp:BTYPES[b.type].hp,maxHp:BTYPES[b.type].hp,vx:0,vy:0,angle:0,falling:false,destroyed:false}));
  placeNextBird(); gs='aiming';
}

function placeNextBird() {
  if(!birds.length){activeBird=null;return;}
  const t=birds[0].type;
  activeBird={x:SLING_X,y:SLING_Y,vx:0,vy:0,type:t,r:BIRDS[t].r,angle:0,trail:[]};
  specialUsed=false; dragX=SLING_X; dragY=SLING_Y;
}

function consumeBird() {
  birds.shift(); activeBird=null; gs='settling'; settleTimer=100;
}

function calcStars(){const t=LEVELS[lvlIdx].thresholds;return score>=t[2]?3:score>=t[1]?2:score>=t[0]?1:0;}

function checkEnd() {
  const allDead=pigs.every(p=>p.dead);
  if(!allDead&&birds.length>0){placeNextBird();gs='aiming';return;}
  score+=birds.length*500;
  const st=calcStars();
  if(st>bestStars[lvlIdx]){bestStars[lvlIdx]=st;try{localStorage.setItem('ab_stars',JSON.stringify(bestStars));}catch(e){}}
  gs='results';
}

// ── Update ─────────────────────────────────────────────────────────────────
function update() {
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.vx*=0.97;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  // falling blocks
  for(let i=0;i<blocks.length;i++){
    const b=blocks[i];if(b.destroyed||!b.falling)continue;
    b.vy+=GRAVITY*0.55;b.vx*=0.98;b.x+=b.vx;b.y+=b.vy;b.angle+=b.vx*0.025;
    // pig damage only when block is actually moving fast (prevents false triggers from adjacent blocks)
    const bspd=Math.hypot(b.vx,b.vy);
    if(bspd>3.5){
      pigs.forEach(pig=>{
        if(pig.dead)return;
        if(circAABB(pig.x,pig.y,pig.r,b.x,b.y,b.w,b.h)){
          pig.hp-=Math.max(1,Math.floor(bspd/4));
          if(pig.hp<=0){pig.dead=true;score+=1000;burst(pig.x,pig.y,'#88dd44',16);}
          else burst(pig.x,pig.y,'#ffaa00',6);
        }
      });
    }
    if(b.y+b.h>=GROUND_Y){b.y=GROUND_Y-b.h;b.vy*=-0.15;b.vx*=0.5;if(Math.abs(b.vy)<0.5)b.vy=0;}
  }

  // egg bombs
  for(let i=eggs.length-1;i>=0;i--){
    const eg=eggs[i];eg.vy+=GRAVITY;eg.x+=eg.vx;eg.y+=eg.vy;
    if(eg.y+eg.r>=GROUND_Y){explode(eg.x,GROUND_Y,65);eggs.splice(i,1);continue;}
    let eHit=false;
    pigs.forEach(pig=>{if(pig.dead||eHit)return;if(circCirc(eg.x,eg.y,eg.r,pig.x,pig.y,pig.r)){explode(eg.x,eg.y,65);eggs.splice(i,1);eHit=true;}});
    if(!eHit)blocks.forEach(blk=>{if(blk.destroyed||eHit)return;if(circAABB(eg.x,eg.y,eg.r,blk.x,blk.y,blk.w,blk.h)){explode(eg.x,eg.y,65);eggs.splice(i,1);eHit=true;}});
  }

  // extra (split clone) birds
  for(let i=extraBirds.length-1;i>=0;i--){
    const b=extraBirds[i];
    b.vx*=0.999;b.vy+=GRAVITY;b.x+=b.vx;b.y+=b.vy;
    b.angle=Math.atan2(b.vy,b.vx);
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>16)b.trail.shift();
    if(b.y+b.r>=GROUND_Y||b.x>W+60){extraBirds.splice(i,1);continue;}
    let hit=false;
    pigs.forEach(pig=>{if(pig.dead||hit)return;if(circCirc(b.x,b.y,b.r,pig.x,pig.y,pig.r)){pig.hp--;if(pig.hp<=0){pig.dead=true;score+=1000;burst(pig.x,pig.y,'#88dd44',14);}burst(b.x,b.y,BIRDS.blue.color,6);hit=true;}});
    if(!hit)blocks.forEach(blk=>{if(blk.destroyed||hit)return;if(circAABB(b.x,b.y,b.r,blk.x,blk.y,blk.w,blk.h)){blk.hp--;if(blk.hp<=0){blk.destroyed=true;score+=200;burst(blk.x+blk.w/2,blk.y+blk.h/2,BTYPES[blk.type].color,8);}burst(b.x,b.y,BIRDS.blue.color,4);hit=true;}});
    if(hit)extraBirds.splice(i,1);
  }

  // active bird flight
  if(gs==='flying'&&activeBird){
    const ab=activeBird;
    ab.vx*=0.999;ab.vy+=GRAVITY;ab.x+=ab.vx;ab.y+=ab.vy;
    ab.angle=Math.atan2(ab.vy,ab.vx);
    ab.trail.push({x:ab.x,y:ab.y});if(ab.trail.length>28)ab.trail.shift();

    if(ab.y+ab.r>=GROUND_Y||ab.x>W+80||ab.x<-120){
      if(ab.type==='black')explode(ab.x,GROUND_Y,90);
      burst(ab.x,Math.min(ab.y,GROUND_Y),BIRDS[ab.type].color,10);
      consumeBird();return;
    }

    let hit=false;
    pigs.forEach(pig=>{
      if(pig.dead||hit)return;
      if(!circCirc(ab.x,ab.y,ab.r,pig.x,pig.y,pig.r))return;
      if(ab.type==='black'){explode(ab.x,ab.y,90);}
      else{
        const spd=Math.hypot(ab.vx,ab.vy);
        const dmg=ab.type==='big'?Math.max(3,Math.floor(spd/3)):Math.max(1,Math.floor(spd/5));
        pig.hp-=dmg;
        if(pig.hp<=0){pig.dead=true;score+=1000;burst(pig.x,pig.y,'#88dd44',16);}
        else burst(pig.x,pig.y,'#ffaa00',8);
        burst(ab.x,ab.y,BIRDS[ab.type].color,8);
      }
      hit=true;
    });
    if(!hit)blocks.forEach(blk=>{
      if(blk.destroyed||hit)return;
      if(!circAABB(ab.x,ab.y,ab.r,blk.x,blk.y,blk.w,blk.h))return;
      if(ab.type==='black'){explode(ab.x,ab.y,90);}
      else{
        const spd=Math.hypot(ab.vx,ab.vy);
        const dmg=ab.type==='big'?Math.max(4,Math.floor(spd/3)):Math.max(1,Math.floor(spd/6));
        blk.hp-=dmg;blk.vx=ab.vx*0.28;blk.vy=ab.vy*0.28-1;blk.falling=true;
        if(blk.hp<=0){blk.destroyed=true;score+=BTYPES[blk.type].score;burst(blk.x+blk.w/2,blk.y+blk.h/2,BTYPES[blk.type].color,12);}
        else burst(blk.x+blk.w/2,blk.y+blk.h/2,BTYPES[blk.type].color,5);
        burst(ab.x,ab.y,BIRDS[ab.type].color,6);
      }
      hit=true;
    });
    if(hit)consumeBird();
  }

  if(gs==='settling'&&--settleTimer<=0)checkEnd();
}

// ── Draw helpers ───────────────────────────────────────────────────────────
function drawBG() {
  const sky=ctx.createLinearGradient(0,0,0,GROUND_Y);
  sky.addColorStop(0,'#4fa3c8');sky.addColorStop(1,'#bde4f8');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GROUND_Y);
  // clouds
  [[100,55,1.1],[290,38,0.85],[510,62,1.2],[730,45,0.9],[950,58,1.05]].forEach(([cx,cy,s])=>{
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.ellipse(cx,cy,55*s,22*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+32*s,cy-11*s,32*s,17*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-30*s,cy-6*s,28*s,15*s,0,0,Math.PI*2);ctx.fill();
  });
  // distant hills
  ctx.fillStyle='rgba(80,160,60,0.35)';
  ctx.beginPath();ctx.moveTo(0,GROUND_Y);
  [0,120,260,400,560,700,850,1000,1100].forEach((x,i)=>{const yy=GROUND_Y-(i%2===0?60:95);ctx.lineTo(x,yy);});
  ctx.lineTo(W,GROUND_Y);ctx.closePath();ctx.fill();
  // ground
  const gnd=ctx.createLinearGradient(0,GROUND_Y,0,H);
  gnd.addColorStop(0,'#5aaa3a');gnd.addColorStop(0.12,'#4a8a28');gnd.addColorStop(1,'#3a6a18');
  ctx.fillStyle=gnd;ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#6dbf45';ctx.fillRect(0,GROUND_Y,W,6);
}

function drawSling() {
  ctx.strokeStyle='#7a4d10';ctx.lineWidth=10;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(SLING_X,GROUND_Y);ctx.lineTo(SLING_X,SLING_Y+14);ctx.stroke();
  ctx.beginPath();ctx.moveTo(SLING_X,SLING_Y+14);ctx.lineTo(SLING_X-24,SLING_Y-12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(SLING_X,SLING_Y+14);ctx.lineTo(SLING_X+24,SLING_Y-12);ctx.stroke();
  const bx=(gs==='aiming'&&dragging&&activeBird)?activeBird.x:SLING_X;
  const by=(gs==='aiming'&&dragging&&activeBird)?activeBird.y:SLING_Y;
  ctx.strokeStyle='#c8832a';ctx.lineWidth=3.5;
  ctx.beginPath();ctx.moveTo(SLING_X-24,SLING_Y-12);ctx.lineTo(bx,by);ctx.stroke();
  ctx.beginPath();ctx.moveTo(SLING_X+24,SLING_Y-12);ctx.lineTo(bx,by);ctx.stroke();
}

function drawAimArc() {
  if(!dragging||!activeBird||gs!=='aiming')return;
  let px=SLING_X,py=SLING_Y,pvx=(SLING_X-dragX)*LAUNCH_K,pvy=(SLING_Y-dragY)*LAUNCH_K;
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<55;i++){
    pvx*=0.999;pvy+=GRAVITY;px+=pvx;py+=pvy;
    if(py>GROUND_Y)break;
    if(i%2===0){ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fill();}
  }
}

function drawBlocks() {
  blocks.forEach(blk=>{
    if(blk.destroyed)return;
    const bt=BTYPES[blk.type];
    ctx.save();
    ctx.translate(blk.x+blk.w/2,blk.y+blk.h/2);ctx.rotate(blk.angle);
    ctx.fillStyle=bt.color;ctx.fillRect(-blk.w/2,-blk.h/2,blk.w,blk.h);
    ctx.strokeStyle=bt.border;ctx.lineWidth=2;ctx.strokeRect(-blk.w/2+1,-blk.h/2+1,blk.w-2,blk.h-2);
    if(blk.hp/blk.maxHp<0.7){
      ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-blk.w*0.2,-blk.h/2);ctx.lineTo(0,0);ctx.lineTo(blk.w*0.25,-blk.h*0.15);ctx.stroke();
    }
    ctx.restore();
  });
}

function drawPigs() {
  pigs.forEach(pig=>{
    if(pig.dead)return;
    ctx.fillStyle=pig.hp<pig.maxHp?'#aa7700':'#55bb22';
    ctx.beginPath();ctx.arc(pig.x,pig.y,pig.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#336600';ctx.lineWidth=2.5;ctx.stroke();
    ctx.fillStyle='#44aa11';
    ctx.beginPath();ctx.ellipse(pig.x,pig.y+pig.r*0.3,pig.r*0.44,pig.r*0.3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a5500';
    [[-0.15,0.27],[0.15,0.27]].forEach(([ox,oy])=>{ctx.beginPath();ctx.arc(pig.x+pig.r*ox,pig.y+pig.r*oy,3,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#fff';
    [[-0.34,-0.22],[0.34,-0.22]].forEach(([ox,oy])=>{ctx.beginPath();ctx.arc(pig.x+pig.r*ox,pig.y+pig.r*oy,5.5,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#111';
    [[-0.31,-0.2],[0.31,-0.2]].forEach(([ox,oy])=>{ctx.beginPath();ctx.arc(pig.x+pig.r*ox,pig.y+pig.r*oy,2.8,0,Math.PI*2);ctx.fill();});
    if(pig.hp<pig.maxHp){
      ctx.strokeStyle='#773300';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(pig.x-9,pig.y+pig.r*0.62);ctx.lineTo(pig.x-3,pig.y+pig.r*0.46);ctx.lineTo(pig.x+3,pig.y+pig.r*0.56);ctx.lineTo(pig.x+9,pig.y+pig.r*0.4);ctx.stroke();
    }
  });
}

function drawEggs() {
  eggs.forEach(eg=>{
    ctx.fillStyle='#f8f0e0';ctx.strokeStyle='#ddd';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(eg.x,eg.y,eg.r,eg.r*1.35,Math.atan2(eg.vy,eg.vx)+Math.PI/2,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
}

function drawOneBird(bird) {
  if(!bird)return;
  const bt=BIRDS[bird.type];
  // trail
  if(bird.trail&&bird.trail.length>1){
    bird.trail.forEach((pt,i)=>{
      ctx.globalAlpha=(i/bird.trail.length)*0.38;
      ctx.fillStyle=bt.color;
      ctx.beginPath();ctx.arc(pt.x,pt.y,bird.r*(i/bird.trail.length)*0.65,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
  }
  ctx.save();
  ctx.translate(bird.x,bird.y);ctx.rotate(bird.angle||0);
  // body
  ctx.fillStyle=bt.color;
  ctx.beginPath();ctx.arc(0,0,bird.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1.8;ctx.stroke();
  // eye (shared)
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bird.r*0.35,-bird.r*0.26,bird.r*0.32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(bird.r*0.4,-bird.r*0.23,bird.r*0.15,0,Math.PI*2);ctx.fill();

  switch(bird.type) {
    case 'red': case 'big':
      // angry eyebrow
      ctx.strokeStyle='#880000';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(bird.r*0.08,-bird.r*0.55);ctx.lineTo(bird.r*0.72,-bird.r*0.4);ctx.stroke();
      // beak
      ctx.fillStyle='#f4a020';
      ctx.beginPath();ctx.moveTo(bird.r*0.55,-bird.r*0.06);ctx.lineTo(bird.r*1.08,bird.r*0.1);ctx.lineTo(bird.r*0.55,bird.r*0.28);ctx.closePath();ctx.fill();
      // tail feathers
      ctx.fillStyle='#bb0000';
      ctx.beginPath();ctx.moveTo(-bird.r*0.6,-bird.r*0.1);ctx.lineTo(-bird.r*1.05,-bird.r*0.5);ctx.lineTo(-bird.r*0.8,bird.r*0.1);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(-bird.r*0.55,bird.r*0.05);ctx.lineTo(-bird.r*1.1,bird.r*0.35);ctx.lineTo(-bird.r*0.7,bird.r*0.3);ctx.closePath();ctx.fill();
      break;
    case 'yellow':
      ctx.fillStyle='#ffe066';
      ctx.beginPath();ctx.moveTo(-bird.r*0.05,-bird.r);ctx.lineTo(bird.r*0.22,-bird.r*1.48);ctx.lineTo(bird.r*0.52,-bird.r*0.88);ctx.closePath();ctx.fill();
      ctx.fillStyle='#f4a020';
      ctx.beginPath();ctx.moveTo(bird.r*0.5,-bird.r*0.08);ctx.lineTo(bird.r*1.05,bird.r*0.08);ctx.lineTo(bird.r*0.5,bird.r*0.24);ctx.closePath();ctx.fill();
      break;
    case 'blue':
      ctx.fillStyle='rgba(150,200,255,0.55)';
      ctx.beginPath();ctx.ellipse(-bird.r*0.18,-bird.r*0.28,bird.r*0.34,bird.r*0.2,-0.4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#aaccff';
      ctx.beginPath();ctx.moveTo(-bird.r*0.1,-bird.r);ctx.lineTo(bird.r*0.05,-bird.r*1.35);ctx.lineTo(bird.r*0.3,-bird.r*0.9);ctx.closePath();ctx.fill();
      ctx.fillStyle='#f4a020';
      ctx.beginPath();ctx.moveTo(bird.r*0.5,-bird.r*0.06);ctx.lineTo(bird.r*1.0,bird.r*0.1);ctx.lineTo(bird.r*0.5,bird.r*0.25);ctx.closePath();ctx.fill();
      break;
    case 'green':
      // boomerang bird – curved tail
      ctx.fillStyle='#11aa33';
      ctx.beginPath();ctx.moveTo(-bird.r*0.4,bird.r*0.1);ctx.quadraticCurveTo(-bird.r*1.2,-bird.r*0.6,-bird.r*0.9,bird.r*0.6);ctx.lineTo(-bird.r*0.5,bird.r*0.4);ctx.closePath();ctx.fill();
      ctx.fillStyle='#f4a020';
      ctx.beginPath();ctx.moveTo(bird.r*0.5,-bird.r*0.06);ctx.lineTo(bird.r*1.0,bird.r*0.1);ctx.lineTo(bird.r*0.5,bird.r*0.25);ctx.closePath();ctx.fill();
      // white belly
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.beginPath();ctx.ellipse(0,bird.r*0.15,bird.r*0.45,bird.r*0.28,0,0,Math.PI*2);ctx.fill();
      break;
    case 'black':
      // bomb bird – fuse + spark
      ctx.strokeStyle='#888';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-bird.r*0.15,-bird.r);ctx.lineTo(-bird.r*0.35,-bird.r*1.4);ctx.stroke();
      ctx.fillStyle='#ff8800';
      ctx.beginPath();ctx.arc(-bird.r*0.35,-bird.r*1.42,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(-bird.r*0.35,-bird.r*1.42,2,0,Math.PI*2);ctx.fill();
      // angry white highlights
      ctx.strokeStyle='#aaa';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bird.r*0.1,-bird.r*0.55);ctx.lineTo(bird.r*0.65,-bird.r*0.38);ctx.stroke();
      ctx.fillStyle='rgba(80,80,80,0.4)';
      ctx.beginPath();ctx.ellipse(0,bird.r*0.18,bird.r*0.5,bird.r*0.3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#f4a020';
      ctx.beginPath();ctx.moveTo(bird.r*0.5,-bird.r*0.06);ctx.lineTo(bird.r*1.0,bird.r*0.1);ctx.lineTo(bird.r*0.5,bird.r*0.25);ctx.closePath();ctx.fill();
      break;
    case 'white':
      // Matilda – white with red beak + belly spot
      ctx.fillStyle='rgba(255,80,40,0.9)';
      ctx.beginPath();ctx.moveTo(bird.r*0.4,-bird.r*0.1);ctx.lineTo(bird.r*1.1,bird.r*0.05);ctx.lineTo(bird.r*0.4,bird.r*0.32);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(230,230,220,0.5)';
      ctx.beginPath();ctx.ellipse(0,bird.r*0.2,bird.r*0.5,bird.r*0.32,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ccc';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(bird.r*0.05,-bird.r*0.56);ctx.lineTo(bird.r*0.62,-bird.r*0.38);ctx.stroke();
      break;
  }
  ctx.restore();
}

function drawQueue() {
  const all=activeBird?[activeBird,...birds.slice(1)]:birds;
  const typeColors={red:'#e03030',yellow:'#f5c518',blue:'#4488ff',green:'#22cc55',black:'#444',white:'#e8e4d0',big:'#cc1515'};
  const typeLabels={red:'R',yellow:'Y',blue:'B',green:'G',black:'💣',white:'W',big:'T'};
  all.forEach((b,i)=>{
    const bx=28+i*40,by=30;
    ctx.fillStyle=typeColors[b.type]||'#888';
    ctx.beginPath();ctx.arc(bx,by,15,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=b.type==='black'?'#fff':'#000';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(typeLabels[b.type]||b.type[0].toUpperCase(),bx,by+4);ctx.textAlign='left';
  });
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,0,0.48)';ctx.beginPath();ctx.roundRect(W-138,8,130,36,9);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';ctx.textAlign='right';
  ctx.fillText('Score: '+score,W-12,31);ctx.textAlign='left';
  ctx.fillStyle='rgba(0,0,0,0.48)';ctx.beginPath();ctx.roundRect(W/2-58,8,116,36,9);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';ctx.textAlign='center';
  ctx.fillText('Level '+(lvlIdx+1),W/2,31);ctx.textAlign='left';
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });ctx.globalAlpha=1;
}

// ── Screen overlays ────────────────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle='#6ab8d8';ctx.fillRect(0,0,W,H);
  [[100,55,1.1],[280,36,0.88],[520,60,1.18],[780,42,0.95],[1020,58,1.08]].forEach(([cx,cy,s])=>{
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.beginPath();ctx.ellipse(cx,cy,52*s,20*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+30*s,cy-10*s,30*s,16*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-28*s,cy-5*s,26*s,14*s,0,0,Math.PI*2);ctx.fill();
  });
  const gnd=ctx.createLinearGradient(0,470,0,H);gnd.addColorStop(0,'#5aaa3a');gnd.addColorStop(1,'#3a6a18');
  ctx.fillStyle=gnd;ctx.fillRect(0,470,W,H-470);ctx.fillStyle='#6dbf45';ctx.fillRect(0,470,W,6);

  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.roundRect(W/2-205,120,410,240,24);ctx.fill();
  ctx.textAlign='center';
  ctx.fillStyle='#ff4400';ctx.font='bold 52px sans-serif';ctx.fillText('🐦 Angry Birds',W/2,200);
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.font='16px sans-serif';ctx.fillText('Canvas Edition  ·  7 Bird Types  ·  Random Queue',W/2,230);
  ctx.fillStyle='#3ec825';ctx.beginPath();ctx.roundRect(W/2-105,258,210,60,16);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.fillText('▶  Play',W/2,297);
  ctx.textAlign='left';
}

function drawLevelSelect() {
  ctx.fillStyle='#6ab8d8';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 34px sans-serif';ctx.fillText('Choose Level',W/2,80);

  LEVELS.forEach((_,i)=>{
    const locked=i>0&&bestStars[i-1]===0;
    const lx=W/2-220+i*220,ly=145;
    ctx.fillStyle=locked?'rgba(50,50,70,0.75)':'rgba(255,255,255,0.92)';
    ctx.beginPath();ctx.roundRect(lx-80,ly,160,145,18);ctx.fill();
    ctx.fillStyle=locked?'#999':'#333';ctx.font='bold 22px sans-serif';
    ctx.fillText(locked?'🔒':'Level '+(i+1),lx,ly+48);
    ctx.font='25px sans-serif';
    const s=bestStars[i];
    ctx.fillText((s>=1?'⭐':'☆')+(s>=2?'⭐':'☆')+(s>=3?'⭐':'☆'),lx,ly+90);
    ctx.fillStyle='#666';ctx.font='13px sans-serif';
    ctx.fillText(locked?'Clear prev':s?s+'★ best':'-',lx,ly+122);
  });

  ctx.fillStyle='rgba(0,0,0,0.42)';ctx.beginPath();ctx.roundRect(W/2-60,375,120,44,12);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.fillText('← Menu',W/2,403);
  ctx.textAlign='left';
}

function drawResults() {
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(18,38,68,0.97)';ctx.beginPath();ctx.roundRect(W/2-210,H/2-170,420,340,24);ctx.fill();
  const won=pigs.every(p=>p.dead);
  const st=calcStars();
  ctx.textAlign='center';
  ctx.fillStyle=won?'#55ee33':'#ff5544';ctx.font='bold 32px sans-serif';
  ctx.fillText(won?'Level Clear! 🎉':'Out of Birds…',W/2,H/2-108);
  ctx.font='40px sans-serif';
  ctx.fillText((st>=1?'⭐':'☆')+(st>=2?'⭐':'☆')+(st>=3?'⭐':'☆'),W/2,H/2-55);
  ctx.fillStyle='#fff';ctx.font='bold 25px sans-serif';ctx.fillText('Score: '+score,W/2,H/2+5);

  ctx.fillStyle='#d05020';ctx.beginPath();ctx.roundRect(W/2-175,H/2+50,150,50,13);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='18px sans-serif';ctx.fillText('↺ Retry',W/2-100,H/2+81);

  const canNext=won&&lvlIdx<LEVELS.length-1;
  ctx.fillStyle=canNext?'#22aa44':'#555';ctx.beginPath();ctx.roundRect(W/2+25,H/2+50,150,50,13);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillText(canNext?'Next ▶':'Levels',W/2+100,H/2+81);
  ctx.textAlign='left';
}

// ── Main loop ──────────────────────────────────────────────────────────────
function frame() {
  update();
  ctx.clearRect(0,0,W,H);
  if(gs==='menu'){drawMenu();requestAnimationFrame(frame);return;}
  if(gs==='levelSelect'){drawLevelSelect();requestAnimationFrame(frame);return;}
  drawBG();drawSling();drawAimArc();drawBlocks();drawPigs();drawEggs();
  extraBirds.forEach(drawOneBird);drawOneBird(activeBird);
  drawParticles();drawQueue();drawHUD();
  if(gs==='results')drawResults();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── Input ──────────────────────────────────────────────────────────────────
function pos(e){
  const r=C.getBoundingClientRect(),sx=W/r.width,sy=H/r.height;
  const s=e.touches?e.touches[0]:e;
  return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};
}

function onDown(e){
  const{x,y}=pos(e);
  if(gs==='menu'){
    if(x>W/2-105&&x<W/2+105&&y>258&&y<318)gs='levelSelect';
    return;
  }
  if(gs==='levelSelect'){
    if(x>W/2-60&&x<W/2+60&&y>375&&y<419){gs='menu';return;}
    LEVELS.forEach((_,i)=>{
      if(i>0&&bestStars[i-1]===0)return;
      const lx=W/2-220+i*220;
      if(x>lx-80&&x<lx+80&&y>145&&y<290)loadLevel(i);
    });
    return;
  }
  if(gs==='results'){
    if(x>W/2-175&&x<W/2-25&&y>H/2+50&&y<H/2+100){loadLevel(lvlIdx);return;}
    const canNext=pigs.every(p=>p.dead)&&lvlIdx<LEVELS.length-1;
    if(x>W/2+25&&x<W/2+175&&y>H/2+50&&y<H/2+100){if(canNext){lvlIdx++;loadLevel(lvlIdx);}else gs='levelSelect';}
    return;
  }
  if(gs==='aiming'&&activeBird){
    if(Math.hypot(x-SLING_X,y-SLING_Y)<80){dragging=true;dragX=x;dragY=y;}
  }
}

function onMove(e){
  if(!dragging||gs!=='aiming')return;
  const{x,y}=pos(e);
  const d=Math.hypot(x-SLING_X,y-SLING_Y);
  const a=Math.atan2(y-SLING_Y,x-SLING_X);
  const cl=Math.min(d,SLING_MAX);
  dragX=SLING_X+Math.cos(a)*cl;dragY=SLING_Y+Math.sin(a)*cl;
  activeBird.x=dragX;activeBird.y=dragY;
  e.preventDefault();
}

function onUp(){
  if(!dragging||gs!=='aiming'||!activeBird){dragging=false;return;}
  dragging=false;
  activeBird.vx=(SLING_X-dragX)*LAUNCH_K;
  activeBird.vy=(SLING_Y-dragY)*LAUNCH_K;
  activeBird.x=SLING_X;activeBird.y=SLING_Y;activeBird.trail=[];
  gs='flying';
}

C.addEventListener('mousedown', onDown);
C.addEventListener('mousemove', onMove);
C.addEventListener('mouseup',   onUp);
C.addEventListener('touchstart',e=>{onDown(e);e.preventDefault();},{passive:false});
C.addEventListener('touchmove', e=>{onMove(e);e.preventDefault();},{passive:false});
C.addEventListener('touchend',  e=>{onUp(e);  e.preventDefault();},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.key===' '&&gs==='flying'&&activeBird&&!specialUsed){
    e.preventDefault();
    const sp=BIRDS[activeBird.type].special;
    if(!sp)return;
    specialUsed=true;
    if(sp==='boost'){
      activeBird.vx*=2.3;activeBird.vy*=0.5;
      burst(activeBird.x,activeBird.y,'#ffff44',12);
    }else if(sp==='split'){
      extraBirds.push(
        {x:activeBird.x,y:activeBird.y,vx:activeBird.vx*0.9,vy:activeBird.vy-3.5,type:'blue',r:BIRDS.blue.r,angle:0,trail:[]},
        {x:activeBird.x,y:activeBird.y,vx:activeBird.vx*0.9,vy:activeBird.vy+3.5,type:'blue',r:BIRDS.blue.r,angle:0,trail:[]}
      );
      burst(activeBird.x,activeBird.y,'#88aaff',12);
    }else if(sp==='boomerang'){
      activeBird.vx=-Math.abs(activeBird.vx)*0.88;activeBird.vy*=0.25;
      burst(activeBird.x,activeBird.y,'#22cc55',10);
    }else if(sp==='bomb'){
      explode(activeBird.x,activeBird.y,95);
      consumeBird();
    }else if(sp==='egg'){
      eggs.push({x:activeBird.x,y:activeBird.y,vx:activeBird.vx*0.08,vy:4,r:9});
      activeBird.vy=-7;
      burst(activeBird.x,activeBird.y,'#f0ecd8',10);
    }
  }
});
</script>
