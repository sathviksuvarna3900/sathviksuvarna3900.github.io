
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#wrap { display: flex; flex-direction: column; align-items: center; padding: 1rem 0; font-family: var(--font-sans); }
#hud { display: flex; gap: 16px; width: 520px; margin-bottom: 8px; }
.hud-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; display: flex; flex-direction: column; align-items: center; }
.hud-label { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
.hud-val { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
#gc { display: block; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); }
#controls-row { display: flex; gap: 10px; margin-top: 10px; }
#controls-row button { padding: 8px 22px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 13px; cursor: pointer; }
#controls-row button:hover { background: var(--color-background-secondary); }
#hint { font-size: 12px; color: var(--color-text-tertiary); margin-top: 8px; }
#gear-bar { display: flex; gap: 4px; align-items: center; }
.gear-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-tertiary); }
.gear-pip.on { background: #5DCAA5; }
</style>

<h2 class="sr-only">Bike race game — dodge rival bikes and race to the finish line</h2>
<div id="wrap">
  <div id="hud">
    <div class="hud-card"><span class="hud-label">Speed</span><span class="hud-val" id="spd">0</span></div>
    <div class="hud-card"><span class="hud-label">Score</span><span class="hud-val" id="sc">0</span></div>
    <div class="hud-card"><span class="hud-label">Lap</span><span class="hud-val" id="lap">1/5</span></div>
    <div class="hud-card"><span class="hud-label">Lives</span><span class="hud-val" id="lives">3</span></div>
    <div class="hud-card"><span class="hud-label">Gear</span><div id="gear-bar"></div></div>
  </div>
  <canvas id="gc" width="520" height="440"></canvas>
  <div id="controls-row">
    <button id="btn-start">Start Race</button>
    <button id="btn-pause">Pause</button>
  </div>
  <div id="hint">Arrow keys or A/D to steer · W/S or Up/Down to accelerate · Space to brake</div>
</div>

<script>
const C = document.getElementById('gc');
const ctx = C.getContext('2d');
const W = 520, H = 440;

const ROAD_LEFT = 80, ROAD_RIGHT = 440, ROAD_W = 360;
const LANE_W = ROAD_W / 3;

const BIKE_COLORS = ['#D85A30','#378ADD','#7F77DD','#1D9E75','#EF9F27'];
const RIVAL_COLORS = ['#E24B4A','#85B7EB','#AFA9EC','#5DCAA5','#FAC775'];

let state, raf, keys = {};

function initState() {
  return {
    running: false, paused: false, over: false, won: false,
    score: 0, lives: 3, lap: 1, totalLaps: 5,
    roadOffset: 0,
    speed: 0, maxSpeed: 12, gear: 1, maxGear: 6,
    player: { x: W/2, y: H - 90, w: 28, h: 54, lane: 1, color: BIKE_COLORS[0], invincible: 0 },
    rivals: [],
    particles: [],
    roadItems: [],
    clouds: [{x:60,y:40,s:1},{x:200,y:20,s:0.8},{x:380,y:50,s:1.1},{x:480,y:30,s:0.7}],
    trees: Array.from({length:12}, (_,i) => ({
      side: i%2===0 ? 'L':'R',
      y: (i/12)*H*4,
      wobble: Math.random()*6
    })),
    bgOffset: 0,
    flashTimer: 0,
    distance: 0,
    lapDist: 2000,
    nextRivalTimer: 60,
    powerups: [],
    boost: 0,
    boostTimer: 0,
  };
}

function spawnRival(s) {
  const lane = Math.floor(Math.random()*3);
  const color = RIVAL_COLORS[Math.floor(Math.random()*RIVAL_COLORS.length)];
  const rv = Math.random()*4+2;
  s.rivals.push({ x: ROAD_LEFT + lane*LANE_W + LANE_W/2, y:-60, w:26, h:50, speed:rv, color, lane, wobble:0, wobbleDir:1 });
}

function spawnPowerup(s) {
  const lane = Math.floor(Math.random()*3);
  s.powerups.push({ x: ROAD_LEFT + lane*LANE_W + LANE_W/2, y:-30, type: Math.random()<0.5?'boost':'life', collected:false });
}

function drawSky(s) {
  ctx.fillStyle = '#1a2a4a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#223366';
  ctx.fillRect(0, 0, W, H*0.45);
  for(let i=0;i<30;i++){
    const sx = (i*137+s.bgOffset*0.1)%W;
    const sy = (i*73)%(H*0.4);
    const br = i%5===0?2:1;
    ctx.fillStyle = `rgba(255,255,255,${0.3+0.5*(i%3)/3})`;
    ctx.beginPath(); ctx.arc(sx,sy,br,0,Math.PI*2); ctx.fill();
  }
}

function drawCloud(s) {
  s.clouds.forEach(c => {
    ctx.fillStyle = 'rgba(200,220,255,0.18)';
    const x = ((c.x + s.bgOffset*0.2)%W), y = c.y;
    ctx.beginPath();
    ctx.ellipse(x, y, 38*c.s, 16*c.s, 0, 0, Math.PI*2);
    ctx.ellipse(x+20*c.s, y-8*c.s, 22*c.s, 12*c.s, 0, 0, Math.PI*2);
    ctx.ellipse(x-20*c.s, y-4*c.s, 18*c.s, 10*c.s, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawRoad(s) {
  ctx.fillStyle = '#2c3040';
  ctx.fillRect(ROAD_LEFT, 0, ROAD_W, H);

  ctx.fillStyle = '#3a3f50';
  ctx.fillRect(ROAD_LEFT, 0, 8, H);
  ctx.fillRect(ROAD_RIGHT-8, 0, 8, H);

  ctx.strokeStyle = '#faec9a';
  ctx.lineWidth = 3;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(ROAD_LEFT, 0); ctx.lineTo(ROAD_LEFT, H);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ROAD_RIGHT, 0); ctx.lineTo(ROAD_RIGHT, H);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.setLineDash([28, 22]);
  ctx.lineDashOffset = -s.roadOffset;
  for(let l=1;l<3;l++){
    const lx = ROAD_LEFT + l*LANE_W;
    ctx.beginPath();
    ctx.moveTo(lx, 0); ctx.lineTo(lx, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for(let i=0;i<5;i++){
    const ry = ((i*88 + s.roadOffset) % H);
    ctx.fillRect(ROAD_LEFT, ry, ROAD_W, 40);
  }
}

function drawGrass(s) {
  ctx.fillStyle = '#1a3320';
  ctx.fillRect(0, 0, ROAD_LEFT, H);
  ctx.fillRect(ROAD_RIGHT, 0, W-ROAD_RIGHT, H);
  ctx.fillStyle = '#1f3d28';
  ctx.fillRect(0,0,ROAD_LEFT-8,H);
  ctx.fillRect(ROAD_RIGHT+8,0,W-ROAD_RIGHT-8,H);

  s.trees.forEach(t => {
    const ty = ((t.y + s.roadOffset * 1.5) % (H*4)) - 40;
    if(ty < -60 || ty > H+10) return;
    const tx = t.side==='L' ? 30 + t.wobble : W-30 - t.wobble;
    ctx.fillStyle = '#2a1a08';
    ctx.fillRect(tx-4, ty+20, 8, 28);
    ctx.fillStyle = '#1f5c2a';
    ctx.beginPath(); ctx.arc(tx, ty+10, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2d7a3a';
    ctx.beginPath(); ctx.arc(tx-4, ty, 13, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3a9447';
    ctx.beginPath(); ctx.arc(tx+5, ty+5, 10, 0, Math.PI*2); ctx.fill();
  });
}

function drawBike(ctx2, x, y, w, h, color, isPlayer, invincible) {
  if(isPlayer && invincible > 0 && Math.floor(invincible/4)%2===0) return;

  const cx = x - w/2, cy = y - h/2;

  ctx2.fillStyle = '#1a1a2e';
  ctx2.beginPath();
  ctx2.ellipse(cx+w*0.3, cy+h*0.82, w*0.28, w*0.18, 0, 0, Math.PI*2);
  ctx2.fill();
  ctx2.beginPath();
  ctx2.ellipse(cx+w*0.7, cy+h*0.25, w*0.28, w*0.18, 0, 0, Math.PI*2);
  ctx2.fill();

  ctx2.fillStyle = '#111';
  ctx2.beginPath();
  ctx2.arc(cx+w*0.3, cy+h*0.82, w*0.22, 0, Math.PI*2); ctx2.fill();
  ctx2.beginPath();
  ctx2.arc(cx+w*0.7, cy+h*0.25, w*0.22, 0, Math.PI*2); ctx2.fill();

  ctx2.strokeStyle = '#444';
  ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  ctx2.arc(cx+w*0.3, cy+h*0.82, w*0.22, 0, Math.PI*2); ctx2.stroke();
  ctx2.beginPath();
  ctx2.arc(cx+w*0.7, cy+h*0.25, w*0.22, 0, Math.PI*2); ctx2.stroke();

  ctx2.strokeStyle = '#555';
  ctx2.lineWidth = 1;
  for(let sp=0;sp<6;sp++){
    const a = sp*Math.PI/3;
    ctx2.beginPath();
    ctx2.moveTo(cx+w*0.3, cy+h*0.82);
    ctx2.lineTo(cx+w*0.3 + Math.cos(a)*w*0.2, cy+h*0.82 + Math.sin(a)*w*0.2);
    ctx2.stroke();
    ctx2.beginPath();
    ctx2.moveTo(cx+w*0.7, cy+h*0.25);
    ctx2.lineTo(cx+w*0.7 + Math.cos(a)*w*0.2, cy+h*0.25 + Math.sin(a)*w*0.2);
    ctx2.stroke();
  }

  ctx2.fillStyle = '#888';
  ctx2.lineWidth = 2;
  ctx2.strokeStyle = '#666';
  ctx2.beginPath();
  ctx2.moveTo(cx+w*0.3, cy+h*0.78);
  ctx2.lineTo(cx+w*0.5, cy+h*0.55);
  ctx2.lineTo(cx+w*0.7, cy+h*0.28);
  ctx2.lineWidth = 3.5;
  ctx2.strokeStyle = '#777';
  ctx2.stroke();

  ctx2.fillStyle = color;
  ctx2.strokeStyle = '#fff3';
  ctx2.lineWidth = 1;
  ctx2.beginPath();
  ctx2.moveTo(cx+w*0.5, cy+h*0.28);
  ctx2.lineTo(cx+w*0.18, cy+h*0.62);
  ctx2.lineTo(cx+w*0.28, cy+h*0.68);
  ctx2.lineTo(cx+w*0.72, cy+h*0.58);
  ctx2.lineTo(cx+w*0.82, cy+h*0.52);
  ctx2.closePath();
  ctx2.fill(); ctx2.stroke();

  ctx2.fillStyle = isPlayer ? '#1a3a1a' : '#1a1a2e';
  ctx2.beginPath();
  ctx2.ellipse(cx+w*0.5, cy+h*0.18, w*0.22, h*0.12, 0, 0, Math.PI*2);
  ctx2.fill();

  ctx2.fillStyle = '#f4c77a';
  ctx2.beginPath();
  ctx2.ellipse(cx+w*0.5, cy+h*0.1, w*0.16, h*0.08, 0, 0, Math.PI*2);
  ctx2.fill();

  if(isPlayer) {
    ctx2.fillStyle = 'rgba(180,255,180,0.45)';
    ctx2.beginPath();
    ctx2.ellipse(cx+w*0.5, cy+h*0.1, w*0.1, h*0.05, 0, 0, Math.PI*2);
    ctx2.fill();
  }

  ctx2.fillStyle = '#f4c77a';
  ctx2.beginPath();
  ctx2.arc(cx+w*0.72, cy+h*0.58, 4, 0, Math.PI*2); ctx2.fill();
  ctx2.fillStyle = '#EF9F27';
  ctx2.beginPath();
  ctx2.arc(cx+w*0.72, cy+h*0.58, 2, 0, Math.PI*2); ctx2.fill();

  if(isPlayer && s && s.speed > 1) {
    const exhaust = s.boostTimer > 0 ? 14 : 7;
    ctx2.fillStyle = s.boostTimer>0 ? '#5DCAA5' : '#aaa';
    for(let e=0;e<3;e++){
      ctx2.globalAlpha = 0.3 - e*0.08;
      ctx2.beginPath();
      ctx2.ellipse(cx+w*0.3, cy+h*0.82 + 12 + e*exhaust, 4, 3+e*2, 0,0,Math.PI*2);
      ctx2.fill();
    }
    ctx2.globalAlpha = 1;
  }
}

let s;

function drawParticles(s) {
  s.particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPowerups(s) {
  s.powerups.forEach(p => {
    if(p.collected) return;
    const pulse = 1 + 0.12*Math.sin(Date.now()*0.006);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(pulse, pulse);
    if(p.type==='boost') {
      ctx.fillStyle = '#5DCAA5';
      ctx.strokeStyle = '#1D9E75';
    } else {
      ctx.fillStyle = '#D85A30';
      ctx.strokeStyle = '#993C1D';
    }
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 13, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type==='boost' ? 'B' : '+', 0, 0);
    ctx.restore();
  });
}

function drawOverlay(s) {
  if(!s.over && !s.paused && s.running) return;
  ctx.fillStyle = 'rgba(10,14,28,0.72)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign = 'center';
  if(s.paused) {
    ctx.fillStyle = '#fff';
    ctx.font = '500 28px sans-serif';
    ctx.fillText('Paused', W/2, H/2-16);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('Press P or tap Pause to continue', W/2, H/2+18);
  } else if(s.won) {
    ctx.fillStyle = '#5DCAA5';
    ctx.font = '500 32px sans-serif';
    ctx.fillText('Race complete!', W/2, H/2-30);
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.fillText('Score: ' + s.score, W/2, H/2+8);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Tap Start Race to play again', W/2, H/2+38);
  } else if(s.over) {
    ctx.fillStyle = '#E24B4A';
    ctx.font = '500 32px sans-serif';
    ctx.fillText('Crash!', W/2, H/2-30);
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.fillText('Score: ' + s.score, W/2, H/2+8);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText('Tap Start Race to try again', W/2, H/2+38);
  } else {
    ctx.fillStyle = '#fff';
    ctx.font = '500 28px sans-serif';
    ctx.fillText('Bike Race', W/2, H/2-20);
    ctx.font = '14px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('Tap Start Race to begin', W/2, H/2+16);
  }
  ctx.textAlign = 'left';
}

function drawHUDCanvas(s) {
  document.getElementById('spd').textContent = Math.round(s.speed * 10);
  document.getElementById('sc').textContent = s.score;
  document.getElementById('lap').textContent = s.lap + '/' + s.totalLaps;
  document.getElementById('lives').textContent = '♥'.repeat(s.lives);
  const gb = document.getElementById('gear-bar');
  gb.innerHTML = '';
  for(let g=1;g<=s.maxGear;g++){
    const d = document.createElement('div');
    d.className = 'gear-pip' + (g <= s.gear ? ' on' : '');
    gb.appendChild(d);
  }
}

function spawnCrashParticles(s, x, y, color) {
  for(let i=0;i<18;i++){
    const a = (i/18)*Math.PI*2;
    const sp = 2 + Math.random()*4;
    s.particles.push({x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, r: 3+Math.random()*4, color, life:40, maxLife:40});
  }
}

function update(s) {
  if(!s.running || s.paused || s.over || s.won) return;

  const accel = 0.18, decel = 0.08, brake = 0.22;

  if(keys['ArrowUp'] || keys['w'] || keys['W']) {
    s.speed = Math.min(s.maxSpeed, s.speed + accel);
    s.gear = Math.min(s.maxGear, Math.ceil(s.speed / s.maxSpeed * s.maxGear) || 1);
  } else if(keys[' '] || keys['s'] || keys['S'] || keys['ArrowDown']) {
    s.speed = Math.max(0, s.speed - brake);
    s.gear = Math.max(1, Math.ceil(s.speed / s.maxSpeed * s.maxGear));
  } else {
    s.speed = Math.max(0, s.speed - decel);
    s.gear = Math.max(1, Math.ceil(s.speed / s.maxSpeed * s.maxGear));
  }

  if(s.boostTimer > 0) {
    s.boostTimer--;
    s.speed = Math.min(s.maxSpeed * 1.4, s.speed + 0.1);
  }

  const sp = s.speed;
  if(keys['ArrowLeft'] || keys['a'] || keys['A']) {
    s.player.x = Math.max(ROAD_LEFT + s.player.w/2 + 4, s.player.x - 3 - sp*0.15);
  }
  if(keys['ArrowRight'] || keys['d'] || keys['D']) {
    s.player.x = Math.min(ROAD_RIGHT - s.player.w/2 - 4, s.player.x + 3 + sp*0.15);
  }

  s.roadOffset = (s.roadOffset + sp) % 50;
  s.bgOffset = (s.bgOffset + sp*0.4);
  s.distance += sp;

  if(s.distance >= s.lapDist) {
    s.distance = 0;
    s.lap++;
    s.score += 500;
    if(s.lap > s.totalLaps) { s.won = true; return; }
    s.maxSpeed = Math.min(18, s.maxSpeed + 0.5);
  }

  s.score += Math.round(sp * 0.1);

  s.nextRivalTimer--;
  if(s.nextRivalTimer <= 0) {
    spawnRival(s);
    s.nextRivalTimer = Math.max(30, 90 - s.lap*8);
    if(Math.random() < 0.25) spawnPowerup(s);
  }

  s.rivals.forEach(r => {
    r.y += r.speed + sp * 0.6;
    r.wobble += r.wobbleDir * 0.04;
    if(Math.abs(r.wobble) > 6) r.wobbleDir *= -1;
    r.x += r.wobbleDir * 0.3;
    r.x = Math.max(ROAD_LEFT+r.w/2+4, Math.min(ROAD_RIGHT-r.w/2-4, r.x));
  });
  s.rivals = s.rivals.filter(r => r.y < H + 80);

  s.powerups.forEach(p => {
    p.y += sp * 0.8 + 1;
  });
  s.powerups = s.powerups.filter(p => p.y < H + 60 && !p.collected);

  if(s.player.invincible > 0) { s.player.invincible--; }
  else {
    s.rivals.forEach(r => {
      const dx = Math.abs(s.player.x - r.x);
      const dy = Math.abs(s.player.y - r.y);
      if(dx < (s.player.w/2 + r.w/2 - 4) && dy < (s.player.h/2 + r.h/2 - 6)) {
        s.lives--;
        spawnCrashParticles(s, s.player.x, s.player.y, '#E24B4A');
        s.player.invincible = 90;
        if(s.lives <= 0) s.over = true;
      }
    });
  }

  s.powerups.forEach(p => {
    const dx = Math.abs(s.player.x - p.x);
    const dy = Math.abs(s.player.y - p.y);
    if(dx < 20 && dy < 20) {
      p.collected = true;
      if(p.type === 'boost') { s.boostTimer = 120; }
      else { s.lives = Math.min(5, s.lives+1); }
      spawnCrashParticles(s, p.x, p.y, p.type==='boost'?'#5DCAA5':'#D85A30');
      s.score += 100;
    }
  });

  s.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life--;
  });
  s.particles = s.particles.filter(p => p.life > 0);
}

function draw(st) {
  ctx.clearRect(0,0,W,H);
  drawSky(st);
  drawCloud(st);
  drawGrass(st);
  drawRoad(st);

  st.rivals.forEach(r => drawBike(ctx, r.x, r.y, r.w, r.h, r.color, false, 0));
  drawPowerups(st);

  const p = st.player;
  drawBike(ctx, p.x, p.y, p.w, p.h, p.color, true, p.invincible);
  drawParticles(st);

  if(st.distance > 0 && st.running && !st.over && !st.won && !st.paused) {
    const lapPct = st.distance / st.lapDist;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(ROAD_LEFT, H-6, ROAD_W, 6);
    ctx.fillStyle = '#5DCAA5';
    ctx.fillRect(ROAD_LEFT, H-6, ROAD_W * lapPct, 6);
  }

  drawOverlay(st);
  drawHUDCanvas(st);
}

function loop() {
  update(s);
  draw(s);
  raf = requestAnimationFrame(loop);
}

s = initState();
draw(s);
raf = requestAnimationFrame(loop);

document.getElementById('btn-start').addEventListener('click', () => {
  s = initState();
  s.running = true;
});
document.getElementById('btn-pause').addEventListener('click', () => {
  if(!s.running) return;
  s.paused = !s.paused;
  document.getElementById('btn-pause').textContent = s.paused ? 'Resume' : 'Pause';
});

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(e.key === 'p' || e.key === 'P') {
    if(!s.running) return;
    s.paused = !s.paused;
    document.getElementById('btn-pause').textContent = s.paused ? 'Resume' : 'Pause';
  }
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let touchX = null;
C.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; e.preventDefault(); }, {passive:false});
C.addEventListener('touchmove', e => {
  if(touchX === null) return;
  const dx = e.touches[0].clientX - touchX;
